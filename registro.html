<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Papa Andina</title>
  <style>
    body {
      margin: 0;
      font-family: Verdana, sans-serif;
      background: #f5f5dc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 20px;
      width: 100%;
      text-align: center;
      position: absolute;
      top: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      margin-top: 100px;
      text-align: center;
    }

    h2 { color: #2e7d32; }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box; /* Para que no se salga del cuadro */
    }

    button {
      background: #2e7d32;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      font-size: 16px;
    }

    button:hover { background: #1b5e20; }

    .volver {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #8d6e63;
      font-weight: bold;
    }

    #respuesta { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <h1>Papa Andina</h1>
</header>

<div class="container">
  <h2>Regístrate ya</h2>
  <p>Déjanos tus datos para contactarte</p>

  <form id="leadForm">
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="correo" placeholder="Correo electrónico" required>
    <input type="text" id="telefono" placeholder="Teléfono (WhatsApp)">
    <textarea id="mensaje" placeholder="¿En qué podemos ayudarte?" rows="3"></textarea>

    <button type="submit">Enviar mi registro</button>
  </form>

  <p id="respuesta"></p>
  <a href="index.html" class="volver">← Volver al inicio</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3XawD-70jW2RJidq_4YaM46TrKtrsE_Q",
    authDomain: "papa-landing.firebaseapp.com",
    projectId: "papa-landing",
    storageBucket: "papa-landing.firebasestorage.app",
    messagingSenderId: "804613242321",
    appId: "1:804613242321:web:6bd819eb9b8312bb9bb4f0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("leadForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const respuesta = document.getElementById("respuesta");
    respuesta.innerText = "Enviando...";

    try {
      await addDoc(collection(db, "leads"), {
        nombre: document.getElementById("nombre").value,
        correo: document.getElementById("correo").value,
        telefono: document.getElementById("telefono").value,
        mensaje: document.getElementById("mensaje").value,
        fecha: new Date()
      });

      respuesta.style.color = "green";
      respuesta.innerText = "¡Registro exitoso! ✔";
      form.reset();

    } catch (error) {
      respuesta.style.color = "red";
      respuesta.innerText = "Error al enviar ❌";
      console.error(error);
    }
  });
</script>

</body>
</html>
